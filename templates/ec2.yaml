AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 creada desde GitHub Actions

Resources:

  WebSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Permite trafico HTTP hacia la instancia EC2
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP desde internet
      Tags:
        - Key: Name
          Value: SG-EC2-HTTP

  MyEC2:
    Type: AWS::EC2::Instance
    Properties:
      AvailabilityZone: us-east-1a
      ImageId: ami-0cca150d127c2216f
      InstanceType: t3.micro
      SecurityGroupIds:
        - !GetAtt WebSecurityGroup.GroupId
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail

          WEB_ROOT="/var/www/html"
          WEB_SERVICE=""

          if command -v dnf >/dev/null 2>&1; then
            dnf install -y httpd
            WEB_SERVICE="httpd"
          elif command -v yum >/dev/null 2>&1; then
            yum install -y httpd
            WEB_SERVICE="httpd"
          elif command -v apt-get >/dev/null 2>&1; then
            apt-get update
            DEBIAN_FRONTEND=noninteractive apt-get install -y apache2
            WEB_SERVICE="apache2"
          else
            echo "No se encontro un administrador de paquetes soportado." >&2
            exit 1
          fi

          systemctl enable --now "$WEB_SERVICE"

          TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600" || true)
          if [ -n "$TOKEN" ]; then
            INSTANCE_ID=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" "http://169.254.169.254/latest/meta-data/instance-id" || echo "unknown")
            AZ=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" "http://169.254.169.254/latest/meta-data/placement/availability-zone" || echo "unknown")
          else
            INSTANCE_ID="unknown"
            AZ="unknown"
          fi
          BOOT_TIME=$(date -u +"%Y-%m-%d %H:%M UTC")
          install -d -m 0755 "$WEB_ROOT"

          cat > "$WEB_ROOT/index.html" <<EOF
          <!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Nodo 77</title>
            <style>
              :root {
                --bg: #05070f;
                --panel: rgba(8, 14, 28, 0.78);
                --line: rgba(103, 232, 249, 0.3);
                --cyan: #67e8f9;
                --blue: #60a5fa;
                --lime: #bef264;
                --pink: #f0abfc;
                --text: #f8fafc;
                --muted: #b6c2d9;
              }

              * {
                box-sizing: border-box;
              }

              body {
                margin: 0;
                min-height: 100vh;
                overflow-x: hidden;
                font-family: Arial, Helvetica, sans-serif;
                background:
                  radial-gradient(circle at 18% 20%, rgba(96, 165, 250, 0.34), transparent 24rem),
                  radial-gradient(circle at 84% 18%, rgba(240, 171, 252, 0.22), transparent 24rem),
                  radial-gradient(circle at 50% 96%, rgba(190, 242, 100, 0.16), transparent 22rem),
                  var(--bg);
                color: var(--text);
              }

              body::before {
                content: "";
                position: fixed;
                inset: 0;
                pointer-events: none;
                background-image:
                  linear-gradient(rgba(103, 232, 249, 0.08) 1px, transparent 1px),
                  linear-gradient(90deg, rgba(103, 232, 249, 0.08) 1px, transparent 1px);
                background-size: 44px 44px;
              }

              body::after {
                content: "";
                position: fixed;
                inset: 0;
                pointer-events: none;
                background: linear-gradient(120deg, transparent, rgba(103, 232, 249, 0.1), transparent);
                animation: scan 7s linear infinite;
              }

              .shell {
                width: min(1180px, calc(100% - 32px));
                min-height: 100vh;
                margin: 0 auto;
                display: grid;
                grid-template-columns: minmax(0, 1.08fr) minmax(290px, 0.92fr);
                gap: 30px;
                align-items: center;
                padding: 48px 0;
              }

              .hero {
                position: relative;
                min-height: 620px;
                display: grid;
                place-items: center;
              }

              .orbit {
                position: absolute;
                width: min(78vw, 590px);
                aspect-ratio: 1;
                border: 1px solid var(--line);
                border-radius: 50%;
                box-shadow: 0 0 80px rgba(103, 232, 249, 0.18), inset 0 0 70px rgba(96, 165, 250, 0.12);
                animation: rotate 22s linear infinite;
              }

              .orbit::before,
              .orbit::after {
                content: "";
                position: absolute;
                inset: 10%;
                border: 1px dashed rgba(240, 171, 252, 0.34);
                border-radius: inherit;
              }

              .orbit::after {
                inset: 23%;
                border-style: solid;
                border-color: rgba(190, 242, 100, 0.32);
                animation: rotate 12s linear infinite reverse;
              }

              .mark {
                position: relative;
                display: grid;
                place-items: center;
                width: min(74vw, 520px);
                aspect-ratio: 1;
                border-radius: 50%;
                background: radial-gradient(circle, rgba(103, 232, 249, 0.18), transparent 58%);
              }

              .number {
                margin: 0;
                line-height: 0.78;
                font-size: clamp(9rem, 31vw, 22rem);
                font-weight: 900;
                letter-spacing: 0;
                color: transparent;
                -webkit-text-stroke: 2px rgba(248, 250, 252, 0.94);
                text-shadow:
                  0 0 22px rgba(103, 232, 249, 0.9),
                  0 0 76px rgba(96, 165, 250, 0.58),
                  0 0 124px rgba(240, 171, 252, 0.36);
                animation: pulse 2.8s ease-in-out infinite;
              }

              .badge {
                position: absolute;
                bottom: 18%;
                display: inline-flex;
                align-items: center;
                gap: 10px;
                padding: 10px 16px;
                border: 1px solid rgba(103, 232, 249, 0.44);
                border-radius: 999px;
                background: rgba(3, 7, 18, 0.72);
                color: var(--cyan);
                font-size: 0.78rem;
                font-weight: 700;
                letter-spacing: 0.18em;
                text-transform: uppercase;
              }

              .dot {
                width: 9px;
                aspect-ratio: 1;
                border-radius: 50%;
                background: var(--lime);
                box-shadow: 0 0 18px var(--lime);
              }

              .console {
                position: relative;
                padding: 28px;
                border: 1px solid rgba(148, 163, 184, 0.25);
                border-radius: 8px;
                background: linear-gradient(145deg, rgba(15, 23, 42, 0.9), rgba(2, 6, 23, 0.74));
                box-shadow: 0 26px 90px rgba(0, 0, 0, 0.42);
                backdrop-filter: blur(18px);
              }

              .console::before {
                content: "";
                position: absolute;
                inset: 0;
                border-radius: 8px;
                pointer-events: none;
                border-top: 1px solid rgba(103, 232, 249, 0.68);
                border-left: 1px solid rgba(103, 232, 249, 0.34);
                box-shadow: inset 0 0 28px rgba(103, 232, 249, 0.08);
              }

              .eyebrow {
                margin: 0 0 18px;
                color: var(--lime);
                font-size: 0.78rem;
                font-weight: 800;
                letter-spacing: 0.2em;
                text-transform: uppercase;
              }

              h1 {
                margin: 0;
                max-width: 11ch;
                font-size: clamp(3rem, 8vw, 6.6rem);
                line-height: 0.92;
                letter-spacing: 0;
              }

              .subtitle {
                margin: 20px 0 0;
                color: var(--muted);
                font-size: clamp(1rem, 2.4vw, 1.24rem);
                line-height: 1.65;
              }

              .metrics {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 12px;
                margin-top: 28px;
              }

              .metric {
                min-height: 104px;
                padding: 16px;
                border: 1px solid rgba(148, 163, 184, 0.18);
                border-radius: 8px;
                background: rgba(15, 23, 42, 0.62);
              }

              .metric span {
                display: block;
                color: #8ea1bf;
                font-size: 0.76rem;
                font-weight: 800;
                letter-spacing: 0.12em;
                text-transform: uppercase;
              }

              .metric strong {
                display: block;
                margin-top: 10px;
                color: var(--text);
                font-size: 1rem;
                line-height: 1.35;
                overflow-wrap: anywhere;
              }

              .signal {
                margin-top: 28px;
                display: grid;
                gap: 10px;
              }

              .bar {
                height: 10px;
                overflow: hidden;
                border-radius: 999px;
                background: rgba(148, 163, 184, 0.15);
              }

              .bar span {
                display: block;
                width: 77%;
                height: 100%;
                border-radius: inherit;
                background: linear-gradient(90deg, var(--cyan), var(--blue), var(--pink));
                box-shadow: 0 0 24px rgba(103, 232, 249, 0.7);
                animation: charge 3.4s ease-in-out infinite;
              }

              .footer {
                margin-top: 18px;
                display: flex;
                justify-content: space-between;
                gap: 12px;
                color: #8ea1bf;
                font-size: 0.84rem;
              }

              @keyframes rotate {
                to {
                  transform: rotate(360deg);
                }
              }

              @keyframes pulse {
                0%, 100% {
                  transform: scale(1);
                  filter: brightness(1);
                }
                50% {
                  transform: scale(1.025);
                  filter: brightness(1.25);
                }
              }

              @keyframes charge {
                0%, 100% {
                  width: 77%;
                }
                50% {
                  width: 100%;
                }
              }

              @keyframes scan {
                from {
                  transform: translateX(-100%);
                }
                to {
                  transform: translateX(100%);
                }
              }

              @media (max-width: 860px) {
                .shell {
                  grid-template-columns: 1fr;
                  padding: 28px 0;
                }

                .hero {
                  min-height: 420px;
                }

                .console {
                  padding: 22px;
                }
              }

              @media (max-width: 560px) {
                .metrics {
                  grid-template-columns: 1fr;
                }

                .footer {
                  flex-direction: column;
                }
              }
            </style>
          </head>
          <body>
            <main class="shell">
              <section class="hero" aria-label="Nodo visual 77">
                <div class="orbit"></div>
                <div class="mark">
                  <p class="number">77</p>
                  <div class="badge"><span class="dot"></span> Nodo favorito online</div>
                </div>
              </section>

              <section class="console">
                <p class="eyebrow">EC2 / UserData / HTTP</p>
                <h1>Nodo 77 desplegado</h1>
                <p class="subtitle">
                  Esta instancia fue encendida por CloudFormation y preparada automaticamente
                  para servir una pagina web futurista desde Apache.
                </p>

                <div class="metrics">
                  <div class="metric">
                    <span>Stack</span>
                    <strong>${AWS::StackName}</strong>
                  </div>
                  <div class="metric">
                    <span>Instancia</span>
                    <strong>$INSTANCE_ID</strong>
                  </div>
                  <div class="metric">
                    <span>Zona</span>
                    <strong>$AZ</strong>
                  </div>
                  <div class="metric">
                    <span>Arranque</span>
                    <strong>$BOOT_TIME</strong>
                  </div>
                </div>

                <div class="signal" aria-label="Energia del nodo 77">
                  <div class="bar"><span></span></div>
                </div>

                <div class="footer">
                  <span>HTTP activo en puerto 80</span>
                  <span>Identidad visual: 77</span>
                </div>
              </section>
            </main>
          </body>
          </html>
          EOF

      Tags:
        - Key: Name
          Value: EC2-GitHubActions

Outputs:

  InstanceId:
    Value: !Ref MyEC2

  PublicIp:
    Value: !GetAtt MyEC2.PublicIp

  WebsiteURL:
    Value: !Sub "http://${MyEC2.PublicDnsName}"
